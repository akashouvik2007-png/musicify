<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Moodify" />
  <link rel="manifest" href="manifest.json" />
  <title>Moodify</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1ed760;
      --green-dim: #17a349;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 24px);
    }
    .screen.active { display: flex; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb1 { width: 300px; height: 300px; background: var(--green); top: -60px; right: -80px; }
    .orb2 { width: 200px; height: 200px; background: #4a9eff; bottom: 80px; left: -60px; }

    .logo-area {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeUp 0.6s ease both;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: var(--green);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }
    .logo-name {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo-name span { color: var(--green); }
    .logo-sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
    }

    .login-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--green);
      color: #000;
      border: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      animation: fadeUp 0.6s 0.2s ease both;
      transition: transform 0.15s, opacity 0.15s;
    }
    .login-btn:active { transform: scale(0.96); opacity: 0.9; }

    .spotify-icon { width: 22px; height: 22px; }

    /* ── MAIN SCREEN ── */
    #main-screen { gap: 24px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .topbar-logo span { color: var(--green); }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 12px 6px 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #000;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── INPUT CARD ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }
    .input-label {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--green);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .mood-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Syne', sans-serif;
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 80px;
      transition: border-color 0.2s;
    }
    .mood-input::placeholder { color: var(--muted); }
    .mood-input:focus { border-color: var(--green); }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 12px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
    }
    .chip:active, .chip.active {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    .generate-btn {
      width: 100%;
      margin-top: 16px;
      background: var(--green);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .generate-btn:active { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── LOADING ── */
    .loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 0;
    }
    .loading-state.visible { display: flex; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-size: 14px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      text-align: center;
    }

    /* ── PLAYLIST RESULT ── */
    #playlist-section { display: none; flex-direction: column; gap: 16px; }
    #playlist-section.visible { display: flex; }

    .playlist-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }
    .playlist-tag {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--green);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .playlist-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .playlist-count {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }

    .songs-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .song-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.3s ease both;
    }
    .song-item:last-child { border-bottom: none; }
    .song-num {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .song-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .action-row { display: flex; gap: 12px; }

    .create-btn {
      flex: 1;
      background: var(--green);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .create-btn:active { transform: scale(0.98); }
    .create-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .retry-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
    }

    /* ── SUCCESS ── */
    .success-toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 24px);
      left: 24px; right: 24px;
      background: var(--green);
      color: #000;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 700;
      display: flex; align-items: center; gap: 12px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      cursor: pointer;
    }
    .success-toast.show { transform: translateY(0); opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="logo-area">
    <div class="logo-icon">🎵</div>
    <div class="logo-name">mood<span>ify</span></div>
    <div class="logo-sub">your mood → your playlist</div>
  </div>
  <button class="login-btn" onclick="startSpotifyAuth()">
    <svg class="spotify-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    Continue with Spotify
  </button>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">mood<span>ify</span></div>
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-name">you</span>
    </div>
  </div>

  <div class="input-card">
    <div class="input-label">// what's the vibe</div>
    <textarea
      class="mood-input"
      id="mood-input"
      placeholder="e.g. late night drive through the city, rainy afternoon coding session..."
      rows="3"
    ></textarea>
    <div class="chips" id="chips">
      <div class="chip" onclick="setChip(this, 'late night drive')">🌙 late night drive</div>
      <div class="chip" onclick="setChip(this, 'morning run energy')">⚡ morning run</div>
      <div class="chip" onclick="setChip(this, 'chill study session')">📚 study session</div>
      <div class="chip" onclick="setChip(this, 'heartbreak and rain')">🌧️ heartbreak</div>
      <div class="chip" onclick="setChip(this, 'summer festival vibes')">☀️ summer festival</div>
      <div class="chip" onclick="setChip(this, 'coding in the dark')">💻 coding</div>
    </div>
    <button class="generate-btn" id="generate-btn" onclick="generatePlaylist()">
      ✦ Generate Playlist
    </button>
  </div>

  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">asking gemini for vibes...</div>
  </div>

  <div id="playlist-section">
    <div class="playlist-header">
      <div class="playlist-tag">// generated playlist</div>
      <div class="playlist-name" id="playlist-name"></div>
      <div class="playlist-count" id="playlist-count"></div>
    </div>

    <div class="songs-list" id="songs-list"></div>

    <div class="action-row">
      <button class="create-btn" id="create-btn" onclick="createPlaylist()">
        ➕ Add to Spotify
      </button>
      <button class="retry-btn" onclick="resetPlaylist()">↺</button>
    </div>
  </div>
</div>

<!-- SUCCESS TOAST -->
<div class="success-toast" id="toast" onclick="openPlaylist()">
  <span>🎉</span>
  <span id="toast-text">Playlist created! Tap to open.</span>
</div>

<script>
  // ── CONFIG — replace these ──
  const BACKEND_URL = "https://musicify-backend-sg16.onrender.com"; // ← your Railway URL
  const SPOTIFY_CLIENT_ID = "3f8e6a4bb49b46838e1d6aa42790d979";     // ← your Spotify client ID
const REDIRECT_URI = "https://ornate-squirrel-1d8e1e.netlify.app/";               // ← your deployed frontend URL

  // ── STATE ──
  let accessToken = null;
  let currentPlaylist = null;
  let playlistUrl = null;

  // ── SERVICE WORKER ──
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }

  // ── SPOTIFY PKCE AUTH ──
  async function sha256(plain) {
    const encoder = new TextEncoder();
    const data = encoder.encode(plain);
    return crypto.subtle.digest("SHA-256", data);
  }

  function base64urlencode(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  async function startSpotifyAuth() {
    const verifier = base64urlencode(crypto.getRandomValues(new Uint8Array(32)));
    const challenge = base64urlencode(await sha256(verifier));
    localStorage.setItem("pkce_verifier", verifier);

    const params = new URLSearchParams({
      client_id: 3f8e6a4bb49b46838e1d6aa42790d979,
      response_type: "code",
      redirect_uri: REDIRECT_URI,
      code_challenge_method: "S256",
      code_challenge: challenge,
      scope: "playlist-modify-public user-read-private user-read-email",
    });

    window.location = `https://accounts.spotify.com/authorize?${params}`;
  }

  async function handleCallback(code) {
    const verifier = localStorage.getItem("pkce_verifier");
    const res = await fetch("https://accounts.spotify.com/api/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: 3f8e6a4bb49b46838e1d6aa42790d979,
        grant_type: "authorization_code",
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    });
    const data = await res.json();
    accessToken = data.access_token;
    localStorage.setItem("spotify_token", accessToken);
    window.history.replaceState({}, "", "/");
    await loadUser();
    showScreen("main-screen");
  }

  async function loadUser() {
    const res = await fetch("https://api.spotify.com/v1/me", {
      headers: { Authorization: `Bearer ${accessToken}` },
    });
    const user = await res.json();
    document.getElementById("user-name").textContent = user.display_name?.split(" ")[0] || "you";
    const avatar = document.getElementById("user-avatar");
    if (user.images?.[0]?.url) {
      avatar.innerHTML = `<img src="${user.images[0].url}" alt="avatar" />`;
    } else {
      avatar.textContent = (user.display_name || "U")[0].toUpperCase();
    }
  }

  // ── SCREENS ──
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── CHIPS ──
  function setChip(el, text) {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("mood-input").value = text;
  }

  // ── GENERATE ──
  async function generatePlaylist() {
    const prompt = document.getElementById("mood-input").value.trim();
    if (!prompt) return;

    document.getElementById("generate-btn").disabled = true;
    document.getElementById("playlist-section").classList.remove("visible");
    document.getElementById("loading").classList.add("visible");
    document.getElementById("loading-text").textContent = "asking gemini for vibes...";

    try {
      const res = await fetch(`${BACKEND_URL}/api/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      currentPlaylist = data;
      renderPlaylist(data);
    } catch (err) {
      alert("Something went wrong: " + err.message);
    } finally {
      document.getElementById("loading").classList.remove("visible");
      document.getElementById("generate-btn").disabled = false;
    }
  }

  function renderPlaylist({ playlist_name, songs }) {
    document.getElementById("playlist-name").textContent = playlist_name;
    document.getElementById("playlist-count").textContent = `${songs.length} tracks`;

    const list = document.getElementById("songs-list");
    list.innerHTML = songs.map((s, i) => `
      <div class="song-item" style="animation-delay:${i * 30}ms">
        <div class="song-num">${i + 1}</div>
        <div class="song-info">
          <div class="song-title">${s.title}</div>
          <div class="song-artist">${s.artist}</div>
        </div>
        <div class="song-dot"></div>
      </div>
    `).join("");

    document.getElementById("playlist-section").classList.add("visible");
  }

  // ── CREATE PLAYLIST ──
  async function createPlaylist() {
    if (!currentPlaylist) return;
    const btn = document.getElementById("create-btn");
    btn.disabled = true;
    btn.textContent = "Creating...";

    try {
      const res = await fetch(`${BACKEND_URL}/api/create-playlist`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: accessToken,
          playlist_name: currentPlaylist.playlist_name,
          songs: currentPlaylist.songs,
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      playlistUrl = data.playlist_url;
      showToast(`${data.tracks_added} tracks added! Tap to open.`);
    } catch (err) {
      alert("Could not create playlist: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "➕ Add to Spotify";
    }
  }

  function resetPlaylist() {
    document.getElementById("playlist-section").classList.remove("visible");
    document.getElementById("mood-input").value = "";
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    currentPlaylist = null;
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    document.getElementById("toast-text").textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 5000);
  }

  function openPlaylist() {
    if (playlistUrl) window.open(playlistUrl, "_blank");
  }

  // ── INIT ──
  (async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      await handleCallback(code);
      return;
    }

    const token = localStorage.getItem("spotify_token");
    if (token) {
      accessToken = token;
      try {
        await loadUser();
        showScreen("main-screen");
      } catch {
        localStorage.removeItem("spotify_token");
        showScreen("login-screen");
      }
    } else {
      showScreen("login-screen");
    }
  })();
</script>
</body>
</html>
